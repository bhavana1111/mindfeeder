steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["build", "-t", "gcr.io/$PROJECT_ID/mindfeeder-ui:$COMMIT_SHA", "./ui"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/mindfeeder-ui:$COMMIT_SHA"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mindfeeder-ui
      - "--image=gcr.io/$PROJECT_ID/mindfeeder-ui:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=3000"

images:
  - "gcr.io/$PROJECT_ID/mindfeeder-ui:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
