steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/mindfeeder-triage:$COMMIT_SHA",
        "./api",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/mindfeeder-triage:$COMMIT_SHA"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mindfeeder-triage
      - "--image=gcr.io/$PROJECT_ID/mindfeeder-triage:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/mindfeeder-triage:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
